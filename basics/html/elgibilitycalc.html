<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligibility Calculator</title>
    <style>
        :root {
            --primary-navy: #1e3a8a;
            --accent-blue: #3b82f6;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        main {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-navy);
        }

        h1 {
            color: var(--primary-navy);
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="date"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>

<body>

    <main>
        <h1>Eligibility Calculator</h1>
        <div>
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob">
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="">Select an option...</option>
                    <option value="10+2">10+2</option>
                    <option value="graduate">Graduate Entries</option>
                    <option value="tgc">Technical Graduate Entries</option>
                    <option value="professional">Professional Entries</option>
                </select>

                <div class="10+2" style="display: none;">
                    <label for="currentlyStudyingIn">Currently Studying In</label>
                    <select id="currentlyStudyingIn" name="currentlyStudyingIn">
                        <option value="">Select an option...</option>
                        <option value="class12">Class 12</option>
                        <option value="12thpass">12th Pass</option>
                    </select>
                    <label for="stream">Stream</label>
                    <select id="stream" name="stream">
                        <option value="">Select an option...</option>
                        <option value="PCM">PCM</option>
                        <option value="pcb">PCB</option>
                        <option value="PCMB"></option>
                        <option value="commerce">Commerce</option>
                        <option value="arts">Arts</option>
                    </select>
                </div>

                <button type="button" id="calculate" onclick="checkEligibility()" style="display: none;">Calculate
                    Eligibility</button>

                <p id="result"></p>
            </div>
        </div>
    </main>

</body>

</html>
