<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        /* Container */
        body>* {
            text-align: center;
        }

        /* Card wrapper */
        body {
            flex-direction: column;
        }

        /* Main Card */
        h1,
        h2,
        input,
        button,
        p {
            margin: 10px 0;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #38bdf8, #22c55e);

            color: transparent;
        }

        h2 {
            font-size: 26px;
            color: #38bdf8;
        }

        /* Input */
        input {
            width: 260px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        /* Input focus */
        input:focus {
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        /* Button */
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Button hover */
        button:hover {
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
            transform: scale(1.05);
        }

        /* Result text */
        p {
            font-size: 18px;
            margin-top: 15px;
            color: #cbd5f5;
        }

        /* Glass card effect */
        body::before {
            content: "";
            position: absolute;
            width: 350px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
    </style>
</head>

<body>
    <h1>Find Synonym</h1>
    <h2>Fast</h2>
    <!-- <input type="text" id="synonymInput" placeholder="Enter a word"> -->
    <input type="radio" id="synonymInput" placeholder="Enter a word">
    <button id="findSynonym" onclick="checkAnswer()">Find Synonym</button>
    <p id="result"></p>
    <script src="../javascript/checksynony.js"></script>

</body>

</html>
