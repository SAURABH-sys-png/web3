<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Reading List</title>
    <script src="../javascript/FIRST.js" defer></script>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background-color: #0d1117; /* GitHub Dark Blue/Black */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c9d1d9;
        }

        .container {
            background: #161b22;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            width: 90%;
            max-width: 500px;
        }

        #heading {
            font-size: 1.5rem;
            color: #58a6ff; /* Tactical Blue */
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: #58a6ff; /* Tactical Blue */
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }

        ul {
            list-style: none;
        }

        li {
            background: #21262d;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 6px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Tactical Accent on Hover */
        li:hover {
            border-left: 4px solid #238636; /* Mission Green */
            background: #30363d;
            transform: translateX(10px);
        }

        /* Checkmark Indicator */
        li::before {
            content: "▹";
            margin-right: 15px;
            color: #238636;
            font-weight: bold;
        }

        /* Specific style for finished books (Optional) */
        li.completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1 id="heading">Reading Mission: 2026</h1>
        <ul id="ul">
            <li id="li">Balidan (Para SF)</li>
            <li id="li">Atomic Habits</li>
            <li id="li">Let Us C</li>
            <li id="li">DSA in C++</li>
        </ul>
    </div>
</body>
</html>
