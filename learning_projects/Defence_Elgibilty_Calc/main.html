<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE DECO</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Body */
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f1f5f9;
        }

        /* Header */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 1px solid #334155;
        }

        header div {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 {
            color: #38bdf8;
            margin-right: auto;
        }

        /* Buttons */
        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Input */
        input[type="text"] {
            padding: 7px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        /* Main Section */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        /* Card */
        main>span {
            background: rgba(30, 41, 59, 0.9);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Title */
        h2 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 15px;
            color: #cbd5f5;
        }

        /* Form */
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            text-align: left;
        }

        input[type="date"],
        select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            outline: none;
        }

        /* Check button */
        main button {
            width: 100%;
            margin-top: 10px;
            background: #22c55e;
        }

        main button:hover {
            background: #16a34a;
        }

        /* Result */
        #result {
            margin-top: 15px;
            font-weight: bold;
            color: #facc15;
        }

        /* Header Layout */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* Nav links */
        .nav-links {
            display: flex;
            gap: 10px;
        }

        /* Right section */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Icon buttons (🔥 🐱) */
        .icon-btn {
            font-size: 18px;
            padding: 6px 10px;
            background: #334155;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background: #475569;
        }

        /* Premium button special */
        .premium {
            background: linear-gradient(45deg, #f59e0b, #facc15);
            color: black;
            font-weight: bold;
        }

        .premium:hover {
            transform: scale(1.05);
        }

        /* Search box improved */
        .nav-right input {
            padding: 6px 10px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>JEE DECO</h1>
            <button>Explore</button>
            <button>Contests</button>
            <button>Eligibilty Checker</button>
            <button>About</button>
            <button>Problems</button>


            <input type="text">
            <button><img src="" alt="streak"></button>
            <button><img src="" alt="profile"></button>
            <button>Premium</button>

        </div>
    </header>
    <main>
        <span>
            <h2>Defence Eligibility Calculator</h2>
            <p>Calculate your eligibility for defence services.</p>
            <span>
                <label for="dob">Enter Your Date of Birth</label>
                <input type="date" id="dob">
                <label for="stream"></label>
                <select id="stream">
                    <option value="">Select Your Stream</option>
                    <option value="science">Physics + Maths</option>
                    <option value="commerce">Commerce</option>
                    <option value="arts">Arts</option>
                </select>

                <button onclick="check()">Check Eligibility</button>

                <p id="result"></p>
            </span>

        </span>
    </main>
    <script src="calculator.js"></script>
</body>

</html>
